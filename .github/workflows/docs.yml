# Documentation CI/CD — 自动构建所有文档站并部署到 GitHub Pages
# 触发条件: push 到 main 分支 或 手动触发
# 产物结构:
#   site/
#   ├── index.html          ← 分流索引 (docs-landing/index.html)
#   ├── storybook/          ← 前端组件库
#   ├── typedoc-api/        ← api-server TS API
#   ├── typedoc-shared/     ← shared 类型参考
#   ├── compodoc/           ← api-server NestJS 架构图 (可选,失败则缺)
#   └── python/             ← agents Python API (MkDocs)

name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Code quality checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm spellcheck

      - name: Generate Prisma client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Configure Pages (detect base path)
        uses: actions/configure-pages@v5
        id: pages

      - name: Build Storybook
        env:
          DOCS_BASE_PATH: ${{ steps.pages.outputs.base_path }}storybook/
        run: pnpm --filter @ai-voice/web build-storybook

      - name: Build TypeDoc (api-server)
        run: pnpm --filter @ai-voice/api-server docs:typedoc

      - name: Build TypeDoc (shared)
        run: pnpm --filter @ai-voice/shared docs:typedoc

      - name: Build Compodoc (容错,失败不影响其他文档)
        continue-on-error: true
        run: pnpm --filter @ai-voice/api-server docs:compodoc

      - name: Build MkDocs (Python)
        working-directory: ./agents
        env:
          MKDOCS_SITE_URL: ${{ steps.pages.outputs.base_url }}python/
        run: uv run --group docs mkdocs build

      - name: Assemble site directory
        run: |
          mkdir -p site
          # 分流索引
          cp docs-landing/index.html site/index.html
          # Storybook
          cp -r apps/web/storybook-static site/storybook
          # TypeDoc api-server
          cp -r apps/api-server/docs/typedoc site/typedoc-api
          # TypeDoc shared
          cp -r packages/shared/docs/typedoc site/typedoc-shared
          # Compodoc (可能不存在,容错)
          if [ -d apps/api-server/docs/compodoc ]; then
            cp -r apps/api-server/docs/compodoc site/compodoc
          fi
          # Python MkDocs
          cp -r agents/site site/python

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
