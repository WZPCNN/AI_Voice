# 统一 CI/CD 流水线
# 合并了原有的 CI、文档构建和发布流程
# 支持并行执行，任何 job 失败时立即中断

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 并发控制：同一分支的新推送自动取消旧的运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '26.3.0'
  PNPM_VERSION: '11.9.0'
  PYTHON_VERSION: '3.14'

jobs:
  # ===== 阶段 1: 代码质量检查（并行执行）=====

  # 代码规范检查
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Run ESLint
        run: pnpm lint

  # 拼写检查
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run spellcheck
        run: pnpm spellcheck

  # TypeScript 类型检查
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Run TypeScript type check
        run: pnpm typecheck

  # TypeScript 测试
  test-ts:
    name: Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Run TypeScript tests
        run: pnpm test

  # Python 测试
  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'agents/uv.lock'

      - name: Install Python dependencies
        working-directory: ./agents
        run: uv sync --frozen

      - name: Run Python tests
        working-directory: ./agents
        run: uv run pytest

  # ===== 阶段 2: 构建（依赖阶段 1 全部成功）=====

  build:
    name: Build
    needs: [lint, spellcheck, typecheck, test-ts, test-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Build all packages
        run: pnpm build

  # ===== 阶段 3: 文档构建（依赖阶段 2 成功）=====

  docs:
    name: Build Documentation
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'agents/uv.lock'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Configure Pages
        uses: actions/configure-pages@v5
        id: pages

      - name: Build Storybook
        env:
          DOCS_BASE_PATH: ${{ steps.pages.outputs.base_path }}storybook/
        run: pnpm --filter @ai-voice/web build-storybook

      - name: Build TypeDoc (api-server)
        run: pnpm --filter @ai-voice/api-server docs:typedoc

      - name: Build TypeDoc (shared)
        run: pnpm --filter @ai-voice/shared docs:typedoc

      - name: Build Compodoc (容错)
        continue-on-error: true
        run: pnpm --filter @ai-voice/api-server docs:compodoc

      - name: Build MkDocs (Python)
        working-directory: ./agents
        env:
          MKDOCS_SITE_URL: ${{ steps.pages.outputs.base_url }}python/
        run: uv run --group docs mkdocs build

      - name: Assemble site directory
        run: |
          mkdir -p site
          cp docs-landing/index.html site/index.html
          cp -r apps/web/storybook-static site/storybook
          cp -r apps/api-server/docs/typedoc site/typedoc-api
          cp -r packages/shared/docs/typedoc site/typedoc-shared
          if [ -d apps/api-server/docs/compodoc ]; then
            cp -r apps/api-server/docs/compodoc site/compodoc
          fi
          cp -r agents/site site/python

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ===== 阶段 4: 部署文档（依赖阶段 3 成功，仅 main 分支）=====

  deploy-docs:
    name: Deploy Documentation
    needs: docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===== 阶段 5: 版本发布（依赖阶段 2 成功，仅 main 分支）=====

  release:
    name: Release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Git Tags
        if: steps.changesets.outputs.published == 'true'
        run: git push --tags
