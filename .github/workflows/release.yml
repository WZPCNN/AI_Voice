# Changeset 自动化版本发布工作流
# 功能：
# 1. 监听 main 分支推送，检查是否有 changeset 文件
# 2. 如果有 changeset，自动创建版本更新 PR
# 3. 当版本 PR 合并后，自动发布版本并打 tag

name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # 拉取完整历史以便 changeset 生成准确的 changelog
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Code Quality Checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm spellcheck
          pnpm test

      - name: Generate Prisma Client
        run: pnpm --filter @ai-voice/api-server prisma:generate

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # 执行版本更新的命令
          version: pnpm changeset:version
          # 发布到 npm 的命令（当前所有包都是 private，不会实际发布）
          publish: pnpm changeset:publish
          # 提交信息格式
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Git Tags
        # 当版本 PR 被合并后，自动推送 git tags
        if: steps.changesets.outputs.published == 'true'
        run: |
          git push --tags
