services:
  postgres:
    image: postgres:19beta1-trixie
    container_name: ai-voice-db
    ports:
      - '5432:5432' # 主机5433端口映射到容器5432端口
    environment:
      - POSTGRES_DB=ai_voice # 默认数据库名称
      - POSTGRES_USER=agent # 数据库用户名
      - POSTGRES_PASSWORD=agent_dev_2026 # 数据库密码
    volumes:
      - ./postgres_data:/var/lib/postgresql # 数据持久化
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agent -d ai_voice']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.8-alpine
    container_name: ai-voice-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-voice-qdrant
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 3

volumes:
  qdrant_data:
  pgdata:
  redisdata:
